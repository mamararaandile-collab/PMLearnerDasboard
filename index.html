<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Professional Educational Dashboard - Project Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Quando&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #4F46E5;
            --secondary: #818CF8;
            --background: #ffffff;
            --surface: #F3F4F6;
            --text-main: #1F2937;
            --text-light: #6B7280;
            --border: #E5E7EB;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quando', serif;
            font-size: 12px;
        }

        body {
            background-color: var(--surface);
            color: var(--text-main);
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .top-bar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: sticky;
            top: 10px;
            z-index: 1000;
        }

        .top-bar h1 {
            font-size: 20px;
            color: var(--primary);
            margin: 0;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: #4338CA; }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #DC2626; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { background: var(--surface); }

        input:not([type="file"]), select, textarea {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s ease;
            background: #fff;
            font-family: 'Quando', serif;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1);
        }

        .report-page {
            background: var(--background);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--surface);
        }

        .info-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .info-group label {
            color: var(--text-light);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.5px;
        }

        .progress-section {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #f0f4ff 0%, #ffffff 100%);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e0e7ff;
        }
        
        .progress-box { flex: 1; }
        .progress-box h3 { margin-bottom: 10px; font-size: 14px; color: var(--primary); }
        .progress-bar-bg { height: 12px; background: var(--border); border-radius: 6px; overflow: hidden; position: relative; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; transition: width 0.5s ease; }
        .progress-text { margin-top: 5px; font-weight: bold; text-align: right; font-size: 14px; }

        .module-section { margin-bottom: 30px; page-break-inside: avoid; }
        .module-section h2 { font-size: 16px; margin-bottom: 15px; color: var(--text-main); border-left: 4px solid var(--primary); padding-left: 10px; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th, td { border: 1px solid var(--border); padding: 8px; text-align: left; vertical-align: middle; }
        th { background-color: var(--surface); font-weight: bold; color: var(--text-light); text-transform: uppercase; font-size: 10px; }
        tr { page-break-inside: avoid; }
        tr:nth-child(even) { background-color: #fafafa; }
        tr:hover { background-color: #f0f4ff; }

        /* Pill-shaped status buttons */
        .status-btn {
            width: 100%;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid transparent;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            transition: all 0.2s;
            user-select: none;
            font-size: 11px;
            min-width: 110px;
            display: inline-block;
        }
        
        .status-- { background: #f8fafc; color: #1e40af; border-color: #e2e8f0; } /* Light pill with blue dash */
        .status-submitted { background: #e0f2fe; color: #0284c7; border-color: #bae6fd; }
        .status-not-submitted { background: #fee2e2; color: #dc2626; border-color: #fecaca; }
        .status-competent { background: #d1fae5; color: #059669; border-color: #a7f3d0; box-shadow: 0 0 5px rgba(16, 185, 129, 0.3); }
        .status-not-yet { background: #ffedd5; color: #ea580c; border-color: #fed7aa; }
        .status-in-progress { background: #f3e8ff; color: #9333ea; border-color: #e9d5ff; }
        .status-plagiarism { background: #7f1d1d; color: #fca5a5; border-color: #991b1b; }
        .status-wrong { background: #fef3c7; color: #b45309; border-color: #fde68a; }
        .status-blank { background: #e5e7eb; color: #4b5563; border-color: #d1d5db; }

        .text-input-date {
            border: 1px solid transparent;
            background: transparent;
            font-family: 'Quando', serif;
            font-size: 11px;
            color: #333;
            width: 100px;
            padding: 4px;
            outline: none;
            transition: border 0.2s;
        }
        .text-input-date:focus, .text-input-date:hover {
            border: 1px solid var(--border);
            border-radius: 4px;
            background: #fff;
        }

        .date-picker-icon {
            width: 25px;
            padding: 2px;
            font-size: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            background: #fff;
        }
        
        .date-text { font-size: 11px; color: #333; font-weight: normal; }
        
        .feedback-section {
            background: #fafafa;
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
            page-break-inside: avoid;
        }
        .feedback-section h2 { margin-bottom: 15px; font-size: 16px; color: var(--primary); }
        textarea { width: 100%; resize: vertical; min-height: 80px; margin-bottom: 15px; }

        .signature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }

        /* Print Media Query */
        @media print {
            body { background: white; padding: 0; font-size: 10px !important; }
            * { font-size: 10px !important; }
            .top-bar, .controls { display: none !important; }
            .report-page { box-shadow: none; padding: 0; }
            .progress-section { border: 1px solid #000; background: white; padding: 10px; margin-bottom: 15px; }
            .module-section { margin-bottom: 15px; }
            th, td { padding: 4px !important; }
            .status-btn { border: 1px solid #000; padding: 4px; font-size: 9px !important; }
            h2 { font-size: 14px !important; margin-bottom: 5px !important; }
            .text-input-date { border: none !important; background: transparent !important; padding: 0; width: auto; }
            .date-picker-icon { display: none !important; }
            button { display: none !important; }
            img#sig-preview { border: none !important; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <!-- Top Navigation -->
        <div class="top-bar">
            <h1>AI Professional Dashboard</h1>
            <div class="controls">
                <input type="text" id="search-learner" placeholder="Search Learner..." list="learner-list">
                <datalist id="learner-list"></datalist>
                <button class="btn btn-outline" onclick="createNewLearner()">New</button>
                <button class="btn btn-success" onclick="saveLearner()">Save Learner</button>
                <button class="btn btn-danger" onclick="deleteLearner()">Delete</button>
                <button class="btn btn-primary" onclick="exportPDF()">Export PDF</button>
                <button class="btn btn-outline" onclick="emailReport()">Email Report</button>
            </div>
        </div>

        <!-- Main Report Area -->
        <div id="report-content" class="report-page">
            
            <div class="progress-section">
                <div class="progress-box">
                    <h3>Current Learner Competency</h3>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="learner-progress-bar"></div>
                    </div>
                    <div class="progress-text" id="learner-progress-text">0%</div>
                </div>
                <div class="progress-box">
                    <h3>Overall Class Competency (All Learners)</h3>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="overall-progress-bar"></div>
                    </div>
                    <div class="progress-text" id="overall-progress-text">0%</div>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-group">
                    <label>Learner Name & Surname</label>
                    <input type="text" id="l-name" placeholder="E.g. John Doe">
                </div>
                <div class="info-group">
                    <label>ID No</label>
                    <input type="text" id="l-id" placeholder="ID Number">
                </div>
                <div class="info-group">
                    <label>Email</label>
                    <input type="email" id="l-email" placeholder="learner@email.com">
                </div>
                <div class="info-group">
                    <label>Phone No</label>
                    <input type="text" id="l-phone" placeholder="Phone Number">
                </div>
                <div class="info-group">
                    <label>Programme / Unit Standard</label>
                    <select id="l-programme">
                        <option value="Project Manager">Project Manager</option>
                        <option value="Business Administration">Business Administration</option>
                        <option value="IT Technical Support">IT Technical Support</option>
                        <option value="Custom">Custom Unit Standard...</option>
                    </select>
                </div>
                <div class="info-group">
                    <label>SAQA ID</label>
                    <input type="text" id="l-saqa" value="101869">
                </div>
                <div class="info-group">
                    <label>Enrolment Date</label>
                    <input type="date" id="l-enrol-date" value="2025-07-08">
                </div>
                <div class="info-group">
                    <label>Completion Date</label>
                    <input type="date" id="l-comp-date" value="2026-07-08">
                </div>
            </div>

            <div id="modules-container"></div>

            <div class="feedback-section">
                <h2>Comment & Feedback Section</h2>
                
                <div class="info-group" style="margin-bottom: 15px;">
                    <label>Select Module to Add to Feedback Notes</label>
                    <div style="display: flex; gap: 10px;">
                        <select id="module-dropdown" style="flex: 1;">
                            <option value="">-- Select a Module --</option>
                            <!-- Dynamically populated -->
                        </select>
                        <button class="btn btn-outline" onclick="appendFeedback()">Add to Notes</button>
                    </div>
                </div>

                <div class="info-group">
                    <label>Assessments needing correction / Notes</label>
                    <textarea id="l-feedback" placeholder="Provide feedback on assessments..."></textarea>
                </div>
                <div class="info-group">
                    <label>Remediation Plan</label>
                    <textarea id="l-remediation" placeholder="Outline steps for remediation..."></textarea>
                </div>
                <div class="signature-grid">
                    <div class="info-group">
                        <label>Facilitator Signature</label>
                        <input type="file" id="sig-upload" accept="image/*" style="display: none;" onchange="handleSignatureUpload(event)">
                        <button class="btn btn-outline" style="align-self: flex-start; margin-top: 5px;" onclick="document.getElementById('sig-upload').click()">Insert Signed Signature</button>
                        <img id="sig-preview" src="" style="max-width: 200px; max-height: 80px; display: none; margin-top: 10px; border: 1px dashed #ccc; padding: 5px;" />
                    </div>
                    <div class="info-group">
                        <label>Date Signed</label>
                        <input type="date" id="l-sig-date">
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const statuses = ['-', '✓ Submitted', '✗ Not Submitted', 'Competent', 'Not Yet Competent', 'In Progress', 'Plagiarism', 'Wrong Assessment', 'Blank Assessment'];

        const kmData = [
            { id: 'KM-01', code: 'KM-01', title: 'Introductory Studies for Project Managers', credits: 4, fDateText: '05/07/2025', sDateText: '08/07/2025' },
            { id: 'KM-02', code: 'KM-02', title: 'Project Integration Management', credits: 4, fDateText: '19/07/2025', sDateText: '22/07/2025' },
            { id: 'KM-03', code: 'KM-03', title: 'Project Scope Management', credits: 8, fDateText: '02/08/2025', sDateText: '05/08/2025' },
            { id: 'KM-04', code: 'KM-04', title: 'Project Time Management', credits: 8, fDateText: '16/08/2025', sDateText: '19/08/2025' },
            { id: 'KM-05', code: 'KM-05', title: 'Project Cost Management', credits: 8, fDateText: '06/09/2025', sDateText: '09/09/2025' },
            { id: 'KM-06', code: 'KM-06', title: 'Project Quality Management', credits: 8, fDateText: '20/09/2025', sDateText: '23/09/2025' },
            { id: 'KM-07', code: 'KM-07', title: 'Project Human Resource Management', credits: 8, fDateText: '04/10/2025', sDateText: '07/10/2025' },
            { id: 'KM-08', code: 'KM-08', title: 'Project Communications Management', credits: 8, fDateText: '18/10/2025', sDateText: '21/10/2025' },
            { id: 'KM-09', code: 'KM-09', title: 'Project Risk Management', credits: 8, fDateText: '10–11/11/2025', sDateText: '12–21/11/2025' },
            { id: 'KM-10', code: 'KM-10', title: 'Project Procurement Management', credits: 8, fDateText: '24–25/11/2025', sDateText: '26/11/2025 – 05/12/2025' },
            { id: 'KM-11', code: 'KM-11', title: 'Project Stakeholder Management', credits: 8, fDateText: '02–03/02/2026', sDateText: '04–13/02/2026' }
        ];

        const pmData = [
            { id: 'PM-01', code: 'PM-01', title: 'Initiate a Project', credits: 4, proposed: '07 – 18 July 2025' },
            { id: 'PM-02', code: 'PM-02', title: 'Plan and Develop Project Management Approach & Scope', credits: 8, proposed: '21 July 2025' },
            { id: 'PM-03', code: 'PM-03', title: 'Plan and Develop Project Timeline & Schedule', credits: 8, proposed: '04 – 22 August 2025' },
            { id: 'PM-04', code: 'PM-04', title: 'Plan and Project Cost', credits: 8, proposed: '25 August – 13 September 2025' },
            { id: 'PM-05', code: 'PM-05', title: 'Plan Project Management Systems', credits: 8, proposed: '12 – 23 January 2026' },
            { id: 'PM-06', code: 'PM-06', title: 'Monitor and Control Project Scope', credits: 8, proposed: '02 – 13 March 2026' },
            { id: 'PM-07', code: 'PM-07', title: 'Control Delivery Schedules and Costs', credits: 8, proposed: '23 March – 10 April 2026' },
            { id: 'PM-08', code: 'PM-08', title: 'Control Project Quality', credits: 8, proposed: '22 June – 03 July 2026' },
            { id: 'PM-09', code: 'PM-09', title: 'Manage and Control Human Resources', credits: 8, proposed: '06 – 17 July 2026' },
            { id: 'PM-10', code: 'PM-10', title: 'Control Communication & Stakeholder Interaction', credits: 8, proposed: '03 – 14 August 2026' },
            { id: 'PM-11', code: 'PM-11', title: 'Manage and Control Project Risks', credits: 8, proposed: '17 – 28 August 2026' },
            { id: 'PM-12', code: 'PM-12', title: 'Manage and Control Procurement', credits: 8, proposed: '01 – 11 September 2026' },
            { id: 'PM-13', code: 'PM-13', title: 'Manage and Control Project Close-Out', credits: 8, proposed: '25 September – 07 October 2026' }
        ];

        const wmData = [
            { id: 'WM-01', code: 'WM-01', title: 'Attend to Project Initiation Processes', credits: 10, proposed: '09 – 23 September 2025' },
            { id: 'WM-02', code: 'WM-02', title: 'Attend to Project Planning Processes', credits: 20, proposed: '04 October – 08 November 2025' },
            { id: 'WM-03', code: 'WM-03', title: 'Attend to Project Execution and Control Processes', credits: 20, proposed: '11 May – 19 June 2026' },
            { id: 'WM-04', code: 'WM-04', title: 'Attend to Project Close-Out Processes', credits: 10, proposed: '25 September – 09 October 2026' }
        ];

        let learners = {};
        let currentLearnerId = null;

        function generateId() { return 'L-' + Math.random().toString(36).substr(2, 9); }

        function getStatusClass(status) {
            switch(status) {
                case '-': return 'status--';
                case '✓ Submitted': return 'status-submitted';
                case '✗ Not Submitted': return 'status-not-submitted';
                case 'Competent': return 'status-competent';
                case 'Not Yet Competent': return 'status-not-yet';
                case 'In Progress': return 'status-in-progress';
                case 'Plagiarism': return 'status-plagiarism';
                case 'Wrong Assessment': return 'status-wrong';
                case 'Blank Assessment': return 'status-blank';
                default: return 'status--';
            }
        }

        function cycleNextStatus(current) {
            let idx = statuses.indexOf(current);
            if(idx === -1) idx = 0;
            return statuses[(idx + 1) % statuses.length];
        }

        function init() {
            populateModuleDropdown();
            const stored = localStorage.getItem('ai_dashboard_learners');
            if (stored) learners = JSON.parse(stored);
            updateSearchList();
            
            const keys = Object.keys(learners);
            if (keys.length > 0) loadLearner(keys[0]);
            else createNewLearner();

            document.getElementById('search-learner').addEventListener('change', (e) => {
                const val = e.target.value;
                const found = Object.values(learners).find(l => l.name === val || l.id === val);
                if (found) { loadLearner(found.id); e.target.value = ''; }
            });
            document.getElementById('report-content').addEventListener('input', calculateProgress);
        }

        function populateModuleDropdown() {
            const dropdown = document.getElementById('module-dropdown');
            dropdown.innerHTML = '<option value="">-- Select a Module --</option>';
            
            const addGroup = (label, data) => {
                const group = document.createElement('optgroup');
                group.label = label;
                data.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = `${m.code} - ${m.title}`;
                    opt.innerText = `${m.code}: ${m.title}`;
                    group.appendChild(opt);
                });
                dropdown.appendChild(group);
            };

            addGroup('Knowledge Modules', kmData);
            addGroup('Practical Skill Modules', pmData);
            addGroup('Work Experience Modules', wmData);
        }

        function appendFeedback() {
            const dropdown = document.getElementById('module-dropdown');
            const textarea = document.getElementById('l-feedback');
            if (dropdown.value) {
                const currentText = textarea.value;
                const newLine = `${dropdown.value}: Needs Correction - `;
                textarea.value = currentText ? currentText + '\n' + newLine : newLine;
                dropdown.value = ''; // reset
            }
        }

        function handleSignatureUpload(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const b64 = event.target.result;
                const preview = document.getElementById('sig-preview');
                preview.src = b64;
                preview.style.display = 'block';
                if(currentLearnerId) {
                    learners[currentLearnerId].signatureImage = b64;
                }
            };
            reader.readAsDataURL(file);
        }

        function createNewLearner() {
            const id = generateId();
            const newL = {
                id: id, name: '', idNo: '', email: '', phone: '', programme: 'Project Manager',
                saqa: '101869', enrolDate: '2025-07-08', compDate: '2026-07-08',
                feedback: '', remediation: '', signatureImage: '', sigDate: '', assessments: {}
            };
            
            kmData.forEach(m => newL.assessments[m.id] = { fDateText: m.fDateText, fStatus: '-', sDateText: m.sDateText, sStatus: '-' });
            pmData.forEach(m => newL.assessments[m.id] = { pDate: '', pStatus: '-', psmStatus: '-' });
            wmData.forEach(m => newL.assessments[m.id] = { wDate: '', status: '-' });

            learners[id] = newL;
            loadLearner(id);
        }

        function loadLearner(id) {
            currentLearnerId = id;
            const l = learners[id];
            
            document.getElementById('l-name').value = l.name;
            document.getElementById('l-id').value = l.idNo;
            document.getElementById('l-email').value = l.email;
            document.getElementById('l-phone').value = l.phone;
            document.getElementById('l-programme').value = l.programme;
            document.getElementById('l-saqa').value = l.saqa;
            document.getElementById('l-enrol-date').value = l.enrolDate;
            document.getElementById('l-comp-date').value = l.compDate;
            document.getElementById('l-feedback').value = l.feedback || '';
            document.getElementById('l-remediation').value = l.remediation || '';
            document.getElementById('l-sig-date').value = l.sigDate || '';
            
            const preview = document.getElementById('sig-preview');
            if (l.signatureImage) {
                preview.src = l.signatureImage;
                preview.style.display = 'block';
            } else {
                preview.src = '';
                preview.style.display = 'none';
            }

            renderTables(l);
            calculateProgress();
        }

        function renderTables(learner) {
            const container = document.getElementById('modules-container');
            container.innerHTML = '';

            // KM Table
            let kmHtml = `<div class="module-section">
                <h2>Knowledge Modules – Formative & Summative Assessments</h2>
                <table>
                    <thead><tr>
                        <th>KM Code</th><th>Module Title</th><th>Credits</th>
                        <th>Formative Date</th><th>Formative Status</th>
                        <th>Summative Date</th><th>Summative Status</th>
                    </tr></thead><tbody>`;
            kmData.forEach(m => {
                const a = learner.assessments[m.id] || { fDateText: m.fDateText, fStatus: '-', sDateText: m.sDateText, sStatus: '-' };
                kmHtml += `<tr>
                    <td><strong>${m.code}</strong></td>
                    <td>${m.title}</td>
                    <td>${m.credits}</td>
                    <td><input type="text" class="text-input-date" data-id="${m.id}" data-col="fDateText" value="${a.fDateText || m.fDateText}"></td>
                    <td><div class="status-btn ${getStatusClass(a.fStatus)}" data-id="${m.id}" data-col="fStatus" onclick="handleStatusClick(this)">${a.fStatus}</div></td>
                    <td><input type="text" class="text-input-date" data-id="${m.id}" data-col="sDateText" value="${a.sDateText || m.sDateText}"></td>
                    <td><div class="status-btn ${getStatusClass(a.sStatus)}" data-id="${m.id}" data-col="sStatus" onclick="handleStatusClick(this)">${a.sStatus}</div></td>
                </tr>`;
            });
            kmHtml += `</tbody></table></div>`;

            // PM Table
            let pmHtml = `<div class="module-section">
                <h2>Practical Skill Modules (Workplace Application & Evidence)</h2>
                <table>
                    <thead><tr>
                        <th>PM Code</th><th>Module Title</th><th>Credits</th>
                        <th>Assessment Period (Proposed)</th>
                        <th>Practical Status</th>
                        <th>PSM Status</th>
                    </tr></thead><tbody>`;
            pmData.forEach(m => {
                const a = learner.assessments[m.id] || { pDate: '', pStatus: '-', psmStatus: '-' };
                pmHtml += `<tr>
                    <td><strong>${m.code}</strong></td>
                    <td>${m.title}</td>
                    <td>${m.credits}</td>
                    <td>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span class="date-text">${m.proposed}</span>
                            <input type="date" class="date-picker-icon" title="Show Date Picker" data-id="${m.id}" data-col="pDate" value="${a.pDate || ''}">
                        </div>
                    </td>
                    <td><div class="status-btn ${getStatusClass(a.pStatus)}" data-id="${m.id}" data-col="pStatus" onclick="handleStatusClick(this)">${a.pStatus}</div></td>
                    <td><div class="status-btn ${getStatusClass(a.psmStatus)}" data-id="${m.id}" data-col="psmStatus" onclick="handleStatusClick(this)">${a.psmStatus}</div></td>
                </tr>`;
            });
            pmHtml += `</tbody></table></div>`;

            // WM Table
            let wmHtml = `<div class="module-section">
                <h2>Work Experience Modules (Logbook & Mentored Hours)</h2>
                <table>
                    <thead><tr>
                        <th>WM Code</th><th>Module Title</th><th>Credits</th>
                        <th>Proposed Assessment Period</th>
                        <th>Status</th>
                    </tr></thead><tbody>`;
            wmData.forEach(m => {
                const a = learner.assessments[m.id] || { wDate: '', status: '-' };
                wmHtml += `<tr>
                    <td><strong>${m.code}</strong></td>
                    <td>${m.title}</td>
                    <td>${m.credits}</td>
                    <td>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span class="date-text">${m.proposed}</span>
                            <input type="date" class="date-picker-icon" title="Show Date Picker" data-id="${m.id}" data-col="wDate" value="${a.wDate || ''}">
                        </div>
                    </td>
                    <td><div class="status-btn ${getStatusClass(a.status)}" data-id="${m.id}" data-col="status" onclick="handleStatusClick(this)">${a.status}</div></td>
                </tr>`;
            });
            wmHtml += `</tbody></table></div>`;

            container.innerHTML = kmHtml + pmHtml + wmHtml;

            // Handle date text edits (KM)
            document.querySelectorAll('.text-input-date').forEach(el => {
                el.addEventListener('change', (e) => {
                    learners[currentLearnerId].assessments[e.target.getAttribute('data-id')][e.target.getAttribute('data-col')] = e.target.value;
                });
            });

            // Handle date picker changes (PM, WM)
            document.querySelectorAll('.date-picker-icon').forEach(el => {
                el.addEventListener('change', (e) => {
                    learners[currentLearnerId].assessments[e.target.getAttribute('data-id')][e.target.getAttribute('data-col')] = e.target.value;
                });
            });
        }

        function handleStatusClick(element) {
            const id = element.getAttribute('data-id');
            const col = element.getAttribute('data-col');
            const nextStatus = cycleNextStatus(element.innerText);
            
            element.innerText = nextStatus;
            element.className = `status-btn ${getStatusClass(nextStatus)}`;
            learners[currentLearnerId].assessments[id][col] = nextStatus;
            
            calculateProgress();
        }

        function saveLearner() {
            if(!currentLearnerId) return;
            const l = learners[currentLearnerId];
            l.name = document.getElementById('l-name').value || 'Unnamed Learner';
            l.idNo = document.getElementById('l-id').value;
            l.email = document.getElementById('l-email').value;
            l.phone = document.getElementById('l-phone').value;
            l.programme = document.getElementById('l-programme').value;
            l.saqa = document.getElementById('l-saqa').value;
            l.enrolDate = document.getElementById('l-enrol-date').value;
            l.compDate = document.getElementById('l-comp-date').value;
            l.feedback = document.getElementById('l-feedback').value;
            l.remediation = document.getElementById('l-remediation').value;
            l.sigDate = document.getElementById('l-sig-date').value;

            localStorage.setItem('ai_dashboard_learners', JSON.stringify(learners));
            updateSearchList();
            alert('Learner data saved successfully!');
            calculateProgress();
        }

        function deleteLearner() {
            if(!currentLearnerId) return;
            if(confirm('Are you sure you want to delete this learner?')) {
                delete learners[currentLearnerId];
                localStorage.setItem('ai_dashboard_learners', JSON.stringify(learners));
                const keys = Object.keys(learners);
                if(keys.length > 0) loadLearner(keys[0]);
                else createNewLearner();
                updateSearchList();
            }
        }

        function updateSearchList() {
            const dl = document.getElementById('learner-list');
            dl.innerHTML = '';
            Object.values(learners).forEach(l => {
                if(l.name) {
                    const opt = document.createElement('option');
                    opt.value = l.name;
                    dl.appendChild(opt);
                }
            });
        }

        function calculateProgress() {
            if (currentLearnerId && learners[currentLearnerId]) {
                const l = learners[currentLearnerId];
                let compCount = 0;
                let totalAssessments = (kmData.length * 2) + (pmData.length * 2) + (wmData.length * 1);
                
                Object.values(l.assessments).forEach(a => {
                    if(a.fStatus === 'Competent') compCount++;
                    if(a.sStatus === 'Competent') compCount++;
                    if(a.pStatus === 'Competent') compCount++;
                    if(a.psmStatus === 'Competent') compCount++;
                    if(a.status === 'Competent') compCount++;
                });

                const pct = totalAssessments === 0 ? 0 : Math.round((compCount / totalAssessments) * 100);
                document.getElementById('learner-progress-bar').style.width = `${pct}%`;
                document.getElementById('learner-progress-text').innerText = `${pct}%`;
            }

            let globalCompCount = 0;
            let globalTotal = 0;
            Object.values(learners).forEach(l => {
                Object.values(l.assessments).forEach(a => {
                    if(a.fStatus === 'Competent') globalCompCount++;
                    if(a.sStatus === 'Competent') globalCompCount++;
                    if(a.pStatus === 'Competent') globalCompCount++;
                    if(a.psmStatus === 'Competent') globalCompCount++;
                    if(a.status === 'Competent') globalCompCount++;
                });
                globalTotal += (kmData.length * 2) + (pmData.length * 2) + (wmData.length * 1);
            });

            const overallPct = globalTotal === 0 ? 0 : Math.round((globalCompCount / globalTotal) * 100);
            document.getElementById('overall-progress-bar').style.width = `${overallPct}%`;
            document.getElementById('overall-progress-text').innerText = `${overallPct}%`;
        }

        function exportPDF() {
            const element = document.getElementById('report-content');
            const opt = {
                margin:       0.3,
                filename:     `${document.getElementById('l-name').value || 'Learner'}_Report.pdf`,
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'a3', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function emailReport() {
            const email = document.getElementById('l-email').value;
            const name = document.getElementById('l-name').value;
            const prog = document.getElementById('l-programme').value;
            const pct = document.getElementById('learner-progress-text').innerText;
            
            const subject = encodeURIComponent(`Assessment Progress Report: ${name} - ${prog}`);
            const body = encodeURIComponent(`Dear ${name},\n\nAttached is your latest assessment progress report for the ${prog} programme.\n\nYour current overall competency is at ${pct}.\n\nPlease review the attached PDF for detailed feedback and required remediations.\n\nBest Regards,\nAssessor`);
            
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
            alert("Your default email client should now open. Don't forget to attach the generated PDF!");
        }

        window.onload = init;
    </script>
</body>
</html>
